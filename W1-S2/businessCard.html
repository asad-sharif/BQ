<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Summary Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="card">
        <section class="result-section">
            <h2>Your Result</h2>
            <div class="score-circle">
                <span class="score">76</span>
                <span class="total">of 100</span>
            </div>
            <div class="result-text">
                <h3>Great</h3>
                <p>You scored higher than 65% of the people who have taken these tests.</p>
            </div>
        </section>

        <section class="summary-section">
            <h2>Summary</h2>
            <ul class="stat-list">
                <li class="stat-item reaction">
                    <div class="stat-label">
                        <span>⚡</span> Reaction
                    </div>
                    <div class="stat-score">80 <span>/ 100</span></div>
                </li>
                <li class="stat-item memory">
                    <div class="stat-label">
                        <span>🧠</span> Memory
                    </div>
                    <div class="stat-score">92 <span>/ 100</span></div>
                </li>
                <li class="stat-item verbal">
                    <div class="stat-label">
                        <span>💬</span> Verbal
                    </div>
                    <div class="stat-score">61 <span>/ 100</span></div>
                </li>
                <li class="stat-item visual">
                    <div class="stat-label">
                        <span>👁️</span> Visual
                    </div>
                    <div class="stat-score">73 <span>/ 100</span></div>
                </li>
            </ul>
            <button class="btn-continue">Continue</button>
        </section>
    </main>

</body>

</html>
